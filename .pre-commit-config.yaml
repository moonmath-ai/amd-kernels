default_stages: [pre-commit, pre-push, manual]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-ast
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=1500']
      - id: detect-private-key
      - id: debug-statements
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.1
    hooks:
      - id: ruff
        args: [--select=F401,F821, --fix]
      - id: ruff-format
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
        exclude: '^(csrc/|.*\.ipynb$)'
        args: ['-L', 'VALU,hsa,nd,te,inout']
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v20.1.7
    hooks:
      - id: clang-format
        # `.hip` is not auto-detected as C++/CUDA by `identify`, so override the
        # hook's default type filter and select files via the `files` regex.
        files: ^csrc/.*\.(cpp|hpp|hip)$
        types_or: [file]
        # Check only: fail on style violations without rewriting the kernels.
        args: [--style=file, --dry-run, --Werror]
